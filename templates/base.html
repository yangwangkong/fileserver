<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FileServer{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root { --sidebar-w: 220px; }
    html, body { height: 100%; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    #sidebar { width: var(--sidebar-w); }
    #main-content { margin-left: var(--sidebar-w); }
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); transition: transform .2s; position: fixed; z-index: 40; }
      #sidebar.open { transform: translateX(0); }
      #main-content { margin-left: 0; }
    }
    .file-row:hover { background-color: #f1f5f9; }
    #drop-zone.dragging { border-color: #3b82f6; background: #eff6ff; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 flex min-h-screen">
  <aside id="sidebar" class="fixed top-0 left-0 h-full bg-gray-900 text-gray-100 flex flex-col overflow-y-auto">
    <div class="px-4 py-5 border-b border-gray-700">
      <a href="/" class="flex items-center gap-2 text-white font-bold text-lg">
        <i class="fa-solid fa-server text-blue-400"></i>
        <span>FileServer</span>
      </a>
    </div>

    <nav class="flex-1 py-3 px-2 space-y-1">
      <p class="text-xs text-gray-500 px-2 uppercase tracking-wider">挂载点</p>
      {% for m in mounts %}
      <a href="/browse/{{ m.name }}"
         class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm hover:bg-gray-700 transition {% if current_mount and current_mount.name == m.name %}bg-gray-700 text-blue-400{% else %}text-gray-300{% endif %}">
        <i class="fa-solid fa-hard-drive w-4 text-center"></i>
        <span class="truncate">{{ m.name }}</span>
        {% if m.writable %}
        <span class="ml-auto text-xs text-green-400" title="可写"><i class="fa-solid fa-pen-to-square"></i></span>
        {% endif %}
      </a>
      {% endfor %}

      <div class="pt-3 mt-3 border-t border-gray-700"></div>
      <a href="/settings/mounts"
         class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm hover:bg-gray-700 transition text-gray-300">
        <i class="fa-solid fa-sliders w-4 text-center"></i>
        <span>挂载管理</span>
      </a>
    </nav>

    <div class="px-4 py-3 border-t border-gray-700">
      <a href="/logout" class="flex items-center gap-2 text-sm text-gray-400 hover:text-red-400 transition">
        <i class="fa-solid fa-right-from-bracket w-4 text-center"></i>
        <span>退出登录</span>
      </a>
    </div>
  </aside>

  <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-30 md:hidden" onclick="toggleSidebar()"></div>

  <div id="main-content" class="flex-1 flex flex-col min-h-screen">
    <header class="sticky top-0 z-20 bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3">
      <button class="md:hidden text-gray-500 hover:text-gray-800" onclick="toggleSidebar()">
        <i class="fa-solid fa-bars text-xl"></i>
      </button>
      <div class="flex-1">{% block header_extra %}{% endblock %}</div>
    </header>

    <main class="flex-1 p-4 md:p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('overlay');
      sb.classList.toggle('open');
      ov.classList.toggle('hidden');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
